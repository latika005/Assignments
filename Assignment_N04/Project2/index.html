<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <main> 
        <nav>
            <div class="logo">
                <h5>Deepstyle</h5>
            </div>
            <div class="menu">
                <p>New Arrivals</p>
                <p>Shop</p>
                <p>Beauty</p>
                <p>Sale</p>
                <p>Journal</p>
            </div>
            <div class="icons">
                <i class="ri-seo-line"></i>
                <i class="ri-user-line"></i>
                <div class="cart">
                    <i class="ri-shopping-cart-2-line"></i>
                </div>
            </div>
        </nav>
        <div class="grid-container">
            <div class="divisions" id="first-div" style="grid-area : box-1">
                <div class="img1">
                    <img src="sunflower.png" alt="">
                </div>
                <div class="font">
                     <p>Summer Collection</p>
                <h4>TRANDY AND CLUSSI FOR NEW SEASON</h4>
                </div>
            </div>
            <div class="divisions" id="second-div" style="grid-area : box-2">
                <h1>Make Your Fashion look more charming</h1>
                <div class="img2">
                    <img src="whiteFlower.png" alt="">
                </div>
                <div class="img4">
                    <img src="star.png" alt="">
                </div>
            </div>
            <div class="divisions" id="third-div" style="grid-area : box-3">
                <div class="img3">
                    <img src="pinkFlower.png" alt="">
                </div>
                 <svg class="text-circle" viewBox="0 0 300 300">
        <defs>
            <path
    id="textPath"
    d="
        M150,150
        m-70,0
        a70,70 0 1,1 140,0
        a70,70 0 1,1 -140,0
    "
/>
        </defs>

        <text>
            <textPath href="#textPath" startOffset="0%">
                EXPLORE MORE COLLECTIONS -------------------------
            </textPath>
        </text>
    </svg>
            </div>
            <div class="divisions" id="fourth-div" style="grid-area : box-4">
                <div class="box1">
                     <img src="https://i.pinimg.com/736x/17/93/a6/1793a6816f02af2b1a9a14f3ee24f201.jpg" alt="">
                </div>
                <div class="box2">
                    <img src="women1.png" alt="">
                </div>
            </div>
            <div class="divisions" id="fifth-div" style="grid-area : box-5">
                <img src="https://i.pinimg.com/736x/d2/e3/ea/d2e3ea0a044a5aa2fa0476ec35505151.jpg" alt="">
            </div>
            <div class="divisions" id="sixth-div" style="grid-area : box-6">
                <div class="part1">
                    <img src="https://i.pinimg.com/1200x/09/d3/29/09d3290351f1df0023b737870e5522e7.jpg" alt="">
                </div>
                <div class="part2">
                    <img src="https://i.pinimg.com/1200x/e8/93/23/e89323b2b0a8994b8f5d61f6db5f2e29.jpg" alt="">
                </div>
            </div>
            <div class="divisions" id="seventh-div" style="grid-area : box-7">
                <div class="section2">
                   <img src="women2.png" alt="">
                </div>
            </div>
            <div class="divisions" id="eighth-div" style="grid-area : box-8">
                <div class="section1">
                    <img src="women3.jpg" alt="">
                </div>
                <div class="img6">
                    <img src="lilacFlower.png" alt="">
                </div>
            </div>
        </div>
        <div id="bottom">
            <div class="signature">
                <i class="ri-double-quotes-l"></i>
                <h4>I'm very much of the `buy less but buy better' philosophy. It's what I've never really knew</h4>
                <div class="blank"></div>
            </div>
            <div class="scroll-down-button">
                <button>
                    <h5>SCROLL DOWN</h5>
                     <i class="ri-arrow-down-s-line"></i></button>
            </div>
            <div class="proceed-icon">
                <h2>01</h2>
                <div class="text">
                    <p>31 May 2022 * Blog</p>
                    <h5>Always be strong and have values</h5>
                </div>
                <button><i class="ri-arrow-right-line"></i></button>
            </div>
        </div>
    </main>
</body>
</html>
